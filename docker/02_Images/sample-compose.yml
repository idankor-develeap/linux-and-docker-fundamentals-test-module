# Sample docker-compose.yml — nginx reverse proxy in front of a Python app
# Usage:
#   docker compose -f sample-compose.yml up -d

services:

  web:
    image: nginx:1.25
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: sample.Dockerfile
    expose:
      - "5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
